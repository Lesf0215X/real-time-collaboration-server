version: "3"

services:

  server:
    build: .
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: realtime_chat
    ports:
      - "5432:5432"

  redis:
    image: redis
    ports:
      - "6379:6379"